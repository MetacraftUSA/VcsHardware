name: Publish to NuGet

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write
    steps:
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Source/Metacraft.VcsHardware.csproj

      - name: Build
        run: dotnet build Source/Metacraft.VcsHardware.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Source/Metacraft.VcsHardware.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
